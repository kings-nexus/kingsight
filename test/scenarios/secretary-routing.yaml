# Secretary routing behavioral scenarios
# Tests: ABCDL classification, quality checklist, preview gate

scenarios:
  - name: "exploration-routes-to-agent"
    description: "User hypothesis message classified as A-class, shows routing plan, does not self-execute"
    input: "I think the tester should also verify agent behavioral output"
    agent: secretary
    expect:
      classification: A
      shows_routing_plan: true
      does_not_self_execute: true
      routing_plan_contains_target: true
      routing_plan_contains_task_prompt: true
    touchfiles:
      - secretary/SKILL.md.tmpl
      - .claude/rules/secretary.md

  - name: "info-query-direct-answer"
    description: "Status check classified as C-class, answered directly without agent dispatch"
    input: "how many ADRs do we have?"
    agent: secretary
    expect:
      classification: C
      no_agent_dispatch: true
      answers_directly: true
      answer_contains_number: true
    touchfiles:
      - secretary/SKILL.md.tmpl

  - name: "quality-checklist-enforced"
    description: "A-class routing prompt includes 6-dim quality self-assessment"
    input: "I think we need to redesign the architect agent from scratch"
    agent: secretary
    expect:
      classification: A
      self_assessment_line_present: true
      data_points_gte: 3
      root_cause_chain_present: true
      file_paths_gte: 3
      user_verbatim_preserved: true
      shows_routing_plan: true
    touchfiles:
      - secretary/SKILL.md.tmpl
